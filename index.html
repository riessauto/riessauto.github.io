<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RIESS GENERAL TRADING | Under Maintenance</title>
  <meta name="description" content="RIESS GENERAL TRADING website is currently under maintenance." />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at top, #2a2a2a 0%, #111 45%, #000 100%);
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 760px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 28px;
      padding: 48px 28px;
      background: rgba(255, 255, 255, 0.055);
      box-shadow: 0 25px 80px rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(10px);
    }

    .logo-box {
      margin: 0 auto 28px;
      width: 170px;
      height: 170px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000000;
      box-shadow: 0 0 35px rgba(255, 255, 255, 0.08);
    }

    .logo-text {
      font-size: 42px;
      font-weight: 800;
      letter-spacing: 3px;
    }

    h1 {
      font-size: clamp(30px, 6vw, 58px);
      line-height: 1.05;
      letter-spacing: 1px;
      margin-bottom: 14px;
      text-transform: uppercase;
    }

    .company {
      font-size: clamp(20px, 4vw, 34px);
      font-weight: 700;
      letter-spacing: 2px;
      margin-bottom: 24px;
      color: #f5f5f5;
    }

    .message {
      font-size: clamp(17px, 3vw, 22px);
      line-height: 1.7;
      color: #d7d7d7;
      margin-bottom: 32px;
    }

    .website {
      display: inline-block;
      color: #ffffff;
      text-decoration: none;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 1px;
      border: 1px solid rgba(255, 255, 255, 0.35);
      padding: 14px 22px;
      border-radius: 999px;
      transition: 0.25s ease;
    }

    .website:hover {
      background: #ffffff;
      color: #000000;
    }

    .footer {
      margin-top: 34px;
      font-size: 14px;
      color: #9f9f9f;
      letter-spacing: 0.5px;
    }

    @media (max-width: 480px) {
      .card {
        padding: 38px 20px;
        border-radius: 22px;
      }

      .logo-box {
        width: 135px;
        height: 135px;
      }

      .logo-text {
        font-size: 34px;
      }
    }
  </style>
</head>

<body>
  <main class="card">
    <!-- Replace this text logo with your logo image if needed:
    <img src="logo.png" alt="RIESS GENERAL TRADING Logo" class="logo-image">
    -->
    <div class="logo-box">
      <div class="logo-text">RIESS</div>
    </div>

    <h1>Website Under Maintenance</h1>

    <div class="company">RIESS GENERAL TRADING</div>

    <p class="message">
      Our website is currently under maintenance.<br />
      We are working to improve your experience and will be back soon.
    </p>

    <a class="website" href="https://www.riessauto.com">www.riessauto.com</a>

    <div class="footer">
      © 2026 RIESS GENERAL TRADING. All rights reserved.
    </div>
  </main>
</body>
</html>
